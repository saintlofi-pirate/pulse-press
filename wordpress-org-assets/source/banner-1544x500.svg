<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" role="img" aria-labelledby="title desc">
  <title id="title">Moonfarmer Reactions Lead Capture WordPress.org banner</title>
  <desc id="desc">Moonfarmer Reactions Lead Capture brand banner showing a reaction widget, email capture, and analytics cards.</desc>
  <defs>
