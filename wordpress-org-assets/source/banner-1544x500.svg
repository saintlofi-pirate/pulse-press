    <path d="M35 78h23l10-21 16 47 15-35 9 9h23" fill="none" stroke="#FEFCF7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M35 78h23l10-21 16 47 15-35 9 9h23" fill="none" stroke="#4FD1C5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
