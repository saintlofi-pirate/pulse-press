  <text x="296" y="254" fill="#6A818B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="480" letter-spacing="0">Privacy-first sentiment, inline capture, and analytics for WordPress publishers.</text>

